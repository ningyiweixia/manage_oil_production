user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format access_json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request",'
        '"status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr","upstream_status":"$upstream_status",'
        '"http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log access_json;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 50m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=addr_conn:10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    upstream backend_cluster {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend_cluster {
        server frontend:8080 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream grafana_cluster {
        server grafana:3000 max_fails=3 fail_timeout=30s;
    }

    include /etc/nginx/conf.d/*.conf;
}
