global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: manage_factory
    environment: production

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: fastapi-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          zone: app
          service: fastapi

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          zone: monitor
          service: container-runtime

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          zone: monitor
          service: host

  - job_name: nginx
    metrics_path: /healthz
    static_configs:
      - targets: ["nginx:80"]
        labels:
          zone: dmz
          service: nginx

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          zone: app
          service: grafana
