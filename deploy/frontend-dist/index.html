<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>manage_factory</title>
    <style>
      body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background: #f4f7fb; color: #1f2937; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
      section { max-width: 760px; background: #fff; border: 1px solid #d8dee9; border-radius: 8px; padding: 32px; box-shadow: 0 12px 36px rgba(15, 23, 42, .08); }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { line-height: 1.7; }
      code { background: #eef2f7; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>采油二厂井下作业管理系统</h1>
        <p>前端 APP 区容器已就绪。将 Vue3 构建产物复制到 <code>deploy/frontend-dist</code> 后重新构建，即可通过 DMZ Nginx 发布。</p>
        <p>后端健康检查：<code>/health</code>；API 前缀：<code>/api/v1</code>；监控看板：<code>/grafana/</code>。</p>
      </section>
    </main>
  </body>
</html>
